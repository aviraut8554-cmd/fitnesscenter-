name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, build & unit tests
    runs-on: ubuntu-latest
    env:
      # Dummy values so env validation passes at build time. Not used to reach
      # any real service in CI.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # Integration suites detect no local Supabase and skip cleanly here.
      - run: npm test

  integration:
    name: Integration tests (Supabase + RLS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - name: Start Supabase and apply migrations
        run: supabase start
      - run: npm test
      - if: always()
        run: supabase stop || true
